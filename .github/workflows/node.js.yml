name: Node.js CI
permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'pnpm'
    - run: pnpm i
    - run: pnpm audit --production
    - run: pnpm --if-present coverage
    - run: pnpm --if-present dev
    - run: pnpm lint
    - name: web-ext lint
      run: npx web-ext lint -s dist/firefox
